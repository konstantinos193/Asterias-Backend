name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Blue-green deploy
    runs-on: ubuntu-latest

    steps:
      - name: SSH and run deploy script on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: /root/asterias-backend/scripts/deploy.sh
          script_stop: true
          command_timeout: 20m
